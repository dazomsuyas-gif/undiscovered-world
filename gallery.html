<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Image Gallery</title>\n    <style>\n        body {\n            font-family: Arial, sans-serif;\n            margin: 0;\n            padding: 0;\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            flex-direction: column;\n            background-color: #f0f0f0;\n        }\n        .gallery {\n            display: flex;\n            flex-wrap: wrap;\n            justify-content: center;\n            gap: 10px;\n        }\n        .gallery img {\n            width: 200px;\n            height: 150px;\n            object-fit: cover;\n            cursor: pointer;\n        }\n        .lightbox {\n            display: none;\n            position: fixed;\n            top: 0;\n            left: 0;\n            width: 100%;\n            height: 100%;\n            background: rgba(0, 0, 0, 0.8);\n            justify-content: center;\n            align-items: center;\n        }\n        .lightbox img {\n            width: 80%;\n            height: auto;\n        }\n    </style>\n</head>\n<body>\n    <h1>Image Gallery</h1>\n    <div class="gallery">\n        <img src="image1.jpg" alt="Image 1" onclick="openLightbox(this.src)">\n        <img src="image2.jpg" alt="Image 2" onclick="openLightbox(this.src)">\n        <img src="image3.jpg" alt="Image 3" onclick="openLightbox(this.src)">\n        <img src="image4.jpg" alt="Image 4" onclick="openLightbox(this.src)">\n    </div>\n    <div id="lightbox" class="lightbox" onclick="closeLightbox()">\n        <img id="lightbox-img" src="" alt="Lightbox Image">\n    </div>\n    <script>\n        function openLightbox(src) {\n            document.getElementById('lightbox-img').src = src;\n            document.getElementById('lightbox').style.display = 'flex';\n        }\n        function closeLightbox() {\n            document.getElementById('lightbox').style.display = 'none';\n        }\n    </script>\n</body>\n</html>
